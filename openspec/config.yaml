schema: spec-driven
context: |
    语言：中文（简体） 所有产出物必须用简体中文撰写。
    文档规范: 流程图要符合ER图的规范, 简单总结而不是复杂描述
rules:
    explore:
        - 按照功能边界明确区分，功能要足够的清晰边界而不是追求直接完成保证任务的稳定性
    proposal:
        - 尽量多使用流程图而不是描述
        - 要分析需求是否过大，如果任务还能区分边界需要询问用户是否切割
    tasks:
        - 每个 plan 的非人工测试部分单元测试覆盖率超过 80%
        - 方法和属性的要包含注释
        - 完成之后必须验证编译能通过
